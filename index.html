<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060910;
      --surface: #0d1117;
      --card: #111820;
      --border: #1e2d3d;
      --accent: #f7931a;
      --accent2: #00d4aa;
      --red: #ff4d4d;
      --green: #00d4aa;
      --text: #e6edf3;
      --muted: #7d8590;
      --font-display: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      padding: 32px 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -300px; right: -200px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(247,147,26,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px; left: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,212,170,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #ff6b00);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent); }

    .last-updated {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    .refresh-btn {
      background: rgba(247,147,26,0.1);
      border: 1px solid rgba(247,147,26,0.3);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 12px;
    }

    .refresh-btn:hover {
      background: rgba(247,147,26,0.2);
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: var(--font-mono);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Table */
    .crypto-table { width: 100%; border-collapse: collapse; }

    .crypto-table th {
      padding: 12px 24px;
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }

    .crypto-table th:last-child,
    .crypto-table td:last-child { text-align: right; }

    .crypto-table td {
      padding: 14px 24px;
      border-bottom: 1px solid rgba(30,45,61,0.5);
      font-size: 14px;
    }

    .crypto-table tr {
      transition: background 0.15s;
      cursor: pointer;
    }

    .crypto-table tr:hover { background: rgba(255,255,255,0.02); }
    .crypto-table tr.active { background: rgba(247,147,26,0.05); }

    .coin-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .coin-rank {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      width: 20px;
    }

    .coin-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff6b00);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
    }

    .coin-name { font-weight: 600; font-size: 14px; }
    .coin-id { font-size: 11px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; }

    .price {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
    }

    .change {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .change.positive { color: var(--green); background: rgba(0,212,170,0.1); }
    .change.negative { color: var(--red); background: rgba(255,77,77,0.1); }

    .market-cap {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* Chart panel */
    .chart-panel { display: flex; flex-direction: column; }

    .chart-coin-info {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .chart-coin-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .chart-coin-price {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .chart-wrap {
      padding: 20px;
      flex: 1;
    }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      gap: 8px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">₿</div>
      <div class="logo-text">Crypto<span>Pulse</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="last-updated" id="lastUpdated">Loading...</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Top Coin Price</div>
      <div class="stat-value" id="statBtcPrice">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">24h Best Performer</div>
      <div class="stat-value" id="statBest" style="color:var(--green)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">24h Worst Performer</div>
      <div class="stat-value" id="statWorst" style="color:var(--red)">—</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Top 10 by Market Cap</span>
        <span class="panel-title" style="color:var(--accent)">Live Data</span>
      </div>
      <div id="tableWrap">
        <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>

    <div class="panel chart-panel">
      <div class="panel-header">
        <span class="panel-title">Price History</span>
      </div>
      <div class="chart-coin-info" id="chartCoinInfo">
        <div class="chart-coin-name" id="chartCoinName">Select a coin</div>
        <div class="chart-coin-price" id="chartCoinPrice">—</div>
      </div>
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:5000';
  let chart = null;
  let coinsData = [];

  function formatPrice(p) {
    if (p >= 1) return '$' + p.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    return '$' + p.toFixed(6);
  }

  function formatMarketCap(m) {
    if (m >= 1e12) return '$' + (m/1e12).toFixed(2) + 'T';
    if (m >= 1e9) return '$' + (m/1e9).toFixed(2) + 'B';
    if (m >= 1e6) return '$' + (m/1e6).toFixed(2) + 'M';
    return '$' + m.toLocaleString();
  }

  function getInitials(name) {
    return name.substring(0, 2).toUpperCase();
  }

  async function loadData() {
    document.getElementById('tableWrap').innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    try {
      const res = await fetch(`${API}/api/latest`);
      coinsData = await res.json();

      if (!coinsData.length) {
        document.getElementById('tableWrap').innerHTML = '<div class="empty-state">No data yet. Run collector.py first.</div>';
        return;
      }

      // Update stats
      const btc = coinsData.find(c => c.coin_id === 'bitcoin') || coinsData[0];
      document.getElementById('statBtcPrice').textContent = formatPrice(btc.price_usd);

      const best = [...coinsData].sort((a,b) => b.price_change_24h - a.price_change_24h)[0];
      const worst = [...coinsData].sort((a,b) => a.price_change_24h - b.price_change_24h)[0];
      document.getElementById('statBest').textContent = `${best.coin_name} +${best.price_change_24h.toFixed(2)}%`;
      document.getElementById('statWorst').textContent = `${worst.coin_name} ${worst.price_change_24h.toFixed(2)}%`;

      document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();

      // Build table
      let html = `<table class="crypto-table">
        <thead><tr>
          <th>#</th>
          <th>Coin</th>
          <th>Price</th>
          <th>24h %</th>
          <th>Market Cap</th>
        </tr></thead><tbody>`;

      coinsData.forEach((coin, i) => {
        const isPos = coin.price_change_24h >= 0;
        html += `<tr onclick="loadHistory('${coin.coin_id}', '${coin.coin_name}', ${coin.price_usd})" id="row-${coin.coin_id}">
          <td><span class="coin-rank">${i+1}</span></td>
          <td><div class="coin-cell">
            <div class="coin-icon">${getInitials(coin.coin_name)}</div>
            <div>
              <div class="coin-name">${coin.coin_name}</div>
              <div class="coin-id">${coin.coin_id}</div>
            </div>
          </div></td>
          <td><span class="price">${formatPrice(coin.price_usd)}</span></td>
          <td><span class="change ${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${coin.price_change_24h.toFixed(2)}%</span></td>
          <td><span class="market-cap">${formatMarketCap(coin.market_cap)}</span></td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('tableWrap').innerHTML = html;

      // Auto load first coin
      if (coinsData.length) {
        loadHistory(coinsData[0].coin_id, coinsData[0].coin_name, coinsData[0].price_usd);
      }

    } catch(err) {
      document.getElementById('tableWrap').innerHTML = `<div class="empty-state">Error connecting to backend.<br>Make sure app.py is running.</div>`;
    }
  }

  async function loadHistory(coinId, coinName, currentPrice) {
    // Highlight active row
    document.querySelectorAll('.crypto-table tr').forEach(r => r.classList.remove('active'));
    const row = document.getElementById(`row-${coinId}`);
    if (row) row.classList.add('active');

    document.getElementById('chartCoinName').textContent = coinName;
    document.getElementById('chartCoinPrice').textContent = formatPrice(currentPrice);

    try {
      const res = await fetch(`${API}/api/history/${coinId}`);
      const history = await res.json();

      const labels = history.map(h => {
        const d = new Date(h.timestamp);
        return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
      }).reverse();

      const prices = history.map(h => h.price_usd).reverse();

      if (chart) chart.destroy();

      const ctx = document.getElementById('priceChart').getContext('2d');
      const isUp = prices[prices.length-1] >= prices[0];
      const color = isUp ? '#00d4aa' : '#ff4d4d';

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: prices,
            borderColor: color,
            backgroundColor: color + '15',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: color,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: { color: '#7d8590', font: { family: 'Space Mono', size: 9 }, maxTicksLimit: 6 },
              grid: { color: '#1e2d3d' }
            },
            y: {
              ticks: { color: '#7d8590', font: { family: 'Space Mono', size: 9 }, callback: v => '$' + v.toLocaleString() },
              grid: { color: '#1e2d3d' }
            }
          }
        }
      });

    } catch(err) {
      console.error(err);
    }
  }

  loadData();
</script>
</body>
</html>
